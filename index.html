<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tetris Complete</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
    touch-action:none;
}

/* HUD */
#hud{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-size:14px;
    font-weight:bold;
    background:rgba(0,0,0,0.4);
    padding:8px 12px;
    border-radius:10px;
    z-index:10;
}

/* フロート */
.float{
    position:absolute;
    color:white;
    font-weight:bold;
    animation:up .6s ease-out forwards;
    pointer-events:none;
}

@keyframes up{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-30px);}
}

/* canvas */
canvas{
    background:black;
    border:2px solid #334155;
}

/* ログイン */
#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.85);
    z-index:100;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:14px;
    text-align:center;
    color:white;
    width:80%;
    max-width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

/* ボタン */
.touch{
    display:grid;
    grid-template-columns:repeat(3,70px);
    gap:8px;
    margin-top:10px;
    justify-content:center;
}

.touch button{
    height:70px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:20px;
    touch-action:manipulation;
}
</style>
</head>

<body>

<!-- HUD -->
<div id="hud">
SCORE:<span id="score">0</span>　
LV:<span id="level">1</span>　
BEST:<span id="best">0</span>
</div>

<!-- ログイン -->
<div id="login">
    <div class="box">
        <h3>LOGIN</h3>
        <input id="name" placeholder="NAME">
        <button id="start">START</button>
    </div>
</div>

<!-- ゲーム -->
<div>
    <canvas id="game"></canvas>

    <div class="touch">
        <button id="left">◀</button>
        <button id="rot">⟳</button>
        <button id="right">▶</button>
        <button id="down">▼</button>
    </div>
</div>

<script>
const COLS=10, ROWS=20, BLOCK=24;

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=COLS*BLOCK;
canvas.height=ROWS*BLOCK;

/* ---------------- BOARD ---------------- */
const board=Array.from({length:ROWS},()=>Array(COLS).fill(0));

const colors=[null,"cyan","blue","orange","yellow","green","purple","red"];

const pieces=[
[],
[[1,1,1,1]],
[[2,0,0],[2,2,2]],
[[0,0,3],[3,3,3]],
[[4,4],[4,4]],
[[0,5,5],[5,5,0]],
[[0,6,0],[6,6,6]],
[[7,7,0],[0,7,7]]
];

/* ---------------- PLAYER ---------------- */
let player={x:0,y:0,m:null};

/* ---------------- SYSTEM ---------------- */
let drop=0,last=0;
let dropInterval=600;

let score=0;
let lines=0;
let level=1;
let combo=0;

/* BEST */
let best=localStorage.getItem("best")||0;

/* ---------------- HUD ---------------- */
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const bestEl=document.getElementById("best");

bestEl.textContent=best;

/* ---------------- DRAW ---------------- */
function drawBlock(x,y,c){
    ctx.fillStyle=c;
    ctx.fillRect(x*BLOCK,y*BLOCK,BLOCK,BLOCK);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    board.forEach((r,y)=>{
        r.forEach((v,x)=>{
            if(v) drawBlock(x,y,colors[v]);
        });
    });

    player.m.forEach((r,y)=>{
        r.forEach((v,x)=>{
            if(v) drawBlock(x+player.x,y+player.y,colors[v]);
        });
    });
}

/* ---------------- COLLIDE ---------------- */
function collide(){
    for(let y=0;y<player.m.length;y++){
        for(let x=0;x<player.m[y].length;x++){
            if(
                player.m[y][x] &&
                (!board[y+player.y] ||
                board[y+player.y][x+player.x])
            ){
                return true;
            }
        }
    }
    return false;
}

/* ---------------- MERGE ---------------- */
function merge(){
    player.m.forEach((r,y)=>{
        r.forEach((v,x)=>{
            if(v){
                board[y+player.y][x+player.x]=v;
            }
        });
    });
}

/* ---------------- ROTATE ---------------- */
function rotate(m){
    return m[0].map((_,i)=>m.map(r=>r[i]).reverse());
}

/* ---------------- SCORE ---------------- */
function addScore(n){

    const table=[0,100,300,500,800];

    combo++;

    score+=table[n]+(combo>1?combo*50:0);

    scoreEl.textContent=score;

    if(score>best){
        best=score;
        localStorage.setItem("best",best);
        bestEl.textContent=best;
    }
}

/* ---------------- CLEAR LINES ---------------- */
function clearLines(){

    let cleared=0;

    for(let y=ROWS-1;y>=0;y--){

        let full=true;

        for(let x=0;x<COLS;x++){
            if(board[y][x]===0){
                full=false;
                break;
            }
        }

        if(full){
            board.splice(y,1);
            board.unshift(Array(COLS).fill(0));
            cleared++;
            lines++;
            y++;
        }
    }

    if(cleared>0){

        addScore(cleared);

        level=Math.floor(lines/10)+1;
        levelEl.textContent=level;

        dropInterval=Math.max(100,600-(level-1)*50);

        combo=0;

        float("+LINE");
    }
}

/* ---------------- FLOAT ---------------- */
function float(text){

    const d=document.createElement("div");

    d.className="float";
    d.textContent=text;

    d.style.left="120px";
    d.style.top="200px";

    document.body.appendChild(d);

    setTimeout(()=>d.remove(),600);
}

/* ---------------- DROP ---------------- */
function dropPiece(){

    player.y++;

    if(collide()){
        player.y--;
        merge();
        clearLines();
        reset();
    }
}

/* ---------------- RESET ---------------- */
function reset(){

    player.m=pieces[(Math.random()*7|0)+1];
    player.x=3;
    player.y=0;

    if(collide()) location.reload();
}

/* ---------------- LOOP ---------------- */
function update(t=0){

    drop+=t-last;
    last=t;

    if(drop>dropInterval){
        dropPiece();
        drop=0;
    }

    draw();
    requestAnimationFrame(update);
}

/* ---------------- CONTROLS ---------------- */
document.addEventListener("keydown",e=>{
    if(e.key=="ArrowLeft") player.x--;
    if(e.key=="ArrowRight") player.x++;
    if(e.key=="ArrowUp") player.m=rotate(player.m);
    if(e.key=="ArrowDown") dropPiece();
});

/* TOUCH */
left.ontouchstart=()=>player.x--;
right.ontouchstart=()=>player.x++;
rot.ontouchstart=()=>player.m=rotate(player.m);
down.ontouchstart=()=>dropPiece();

/* ---------------- LOGIN ---------------- */
start.onclick=()=>{

    login.style.display="none";

    reset();
    update();
};
</script>

</body>
</html>
