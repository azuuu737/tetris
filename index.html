<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tetris</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:sans-serif;
    overflow:hidden;
}

/* ログイン */
#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    z-index:10;
}

.login-box{
    background:#111827;
    padding:24px;
    border-radius:16px;
    text-align:center;
    color:white;
    width:80%;
    max-width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

/* ゲーム */
.container{
    display:flex;
    gap:10px;
}

canvas{
    background:black;
    border:2px solid #334155;
}

/* ボタン */
.touch{
    display:grid;
    grid-template-columns:repeat(3,60px);
    gap:8px;
    margin-top:10px;
    justify-content:center;
}

.touch button{
    height:60px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:20px;
}

/* スマホ */
@media(max-width:600px){
    body{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginScreen">
    <div class="login-box">
        <h2>LOGIN</h2>
        <input id="name" placeholder="NAME">
        <button id="start">START</button>
    </div>
</div>

<!-- ゲーム -->
<div>
    <canvas id="game"></canvas>

    <div class="touch">
        <button id="left">◀</button>
        <button id="rot">⟳</button>
        <button id="right">▶</button>
        <button id="down">▼</button>
    </div>
</div>

<script>
const COLS = 10;
const ROWS = 20;
const BLOCK = 24;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = COLS * BLOCK;
canvas.height = ROWS * BLOCK;

const board = Array.from({length:ROWS},()=>Array(COLS).fill(0));

const colors = [null,"cyan","blue","orange","yellow","green","purple","red"];

const pieces = [
[],
[[1,1,1,1]],
[[2,0,0],[2,2,2]],
[[0,0,3],[3,3,3]],
[[4,4],[4,4]],
[[0,5,5],[5,5,0]],
[[0,6,0],[6,6,6]],
[[7,7,0],[0,7,7]]
];

let player = {
    x:0,y:0,
    m:null
};

let drop=0,last=0;

function drawBlock(x,y,c){
    ctx.fillStyle=c;
    ctx.fillRect(x*BLOCK,y*BLOCK,BLOCK,BLOCK);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    board.forEach((r,y)=>{
        r.forEach((v,x)=>{
            if(v) drawBlock(x,y,colors[v]);
        });
    });

    player.m.forEach((r,y)=>{
        r.forEach((v,x)=>{
            if(v) drawBlock(x+player.x,y+player.y,colors[v]);
        });
    });
}

function collide(){
    for(let y=0;y<player.m.length;y++){
        for(let x=0;x<player.m[y].length;x++){
            if(
                player.m[y][x] &&
                (!board[y+player.y] ||
                board[y+player.y][x+player.x])
            ){
                return true;
            }
        }
    }
    return false;
}

function merge(){
    player.m.forEach((r,y)=>{
        r.forEach((v,x)=>{
            if(v){
                board[y+player.y][x+player.x]=v;
            }
        });
    });
}

function rotate(m){
    return m[0].map((_,i)=>m.map(r=>r[i]).reverse());
}

function reset(){
    player.m = pieces[Math.random()*7|0+1];
    player.x = 3;
    player.y = 0;
    if(collide()) location.reload();
}

function dropPiece(){
    player.y++;
    if(collide()){
        player.y--;
        merge();
        reset();
    }
}

function update(t=0){
    drop += t-last;
    last = t;
    if(drop>600){
        dropPiece();
        drop=0;
    }
    draw();
    requestAnimationFrame(update);
}

/* 操作 */
document.addEventListener("keydown",e=>{
    if(e.key=="ArrowLeft") player.x--;
    if(e.key=="ArrowRight") player.x++;
    if(e.key=="ArrowUp") player.m=rotate(player.m);
    if(e.key=="ArrowDown") dropPiece();
});

/* タッチ */
left.onclick=()=>player.x--;
right.onclick=()=>player.x++;
rot.onclick=()=>player.m=rotate(player.m);
down.onclick=()=>dropPiece();

/* ログイン */
start.onclick=()=>{
    document.getElementById("loginScreen").style.display="none";
    reset();
    update();
};
</script>

</body>
</html>
